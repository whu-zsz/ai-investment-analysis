version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: stock-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: stock_analysis
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - stock-network

  # Go后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: stock_analysis
      JWT_SECRET: your_jwt_secret_key_change_this
      JWT_EXPIRE_HOURS: 24
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      DOUBAO_API_URL: ${DOUBAO_API_URL:-https://ark.cn-beijing.volces.com}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-}
      UPLOAD_PATH: ./uploads
      MAX_UPLOAD_SIZE: 10485760
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mysql
    networks:
      - stock-network

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stock-network

volumes:
  mysql_data:
  redis_data:

networks:
  stock-network:
    driver: bridge
